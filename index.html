<!DOCTYPE DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mdmcode.io | Enterprise Software Solutions</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.25rem;
            color: #94a3b8;
            font-weight: 400;
            margin-top: 0;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>mdmcode.io</h1>
        <h2>Enterprise Software Solutions</h2>
        <hr style="border-color: #334155; margin: 1.5rem 0;">
        <p>Welcome to mdmcode.io. We build scalable full-stack applications, robust automation pipelines, and secure
            cloud infrastructure.</p>
    </div>

</body>

</html>
